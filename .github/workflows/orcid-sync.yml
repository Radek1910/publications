name: Sync ORCID works

on:
  schedule:
    - cron: "0 6 * * 1"      # pon. 06:00 UTC
  workflow_dispatch:        # przycisk "Run workflow"

permissions:
  contents: write          # pozwala zacommitować zmiany

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pobierz prace z ORCID
        run: python scripts/sync_orcid.py
      - name: Commit zmian
        run: |
          git config user.name "orcid-bot"
          git config user.email "actions@github.com"
          git add README.md publications.bib publications.ris index.html
          git diff --staged --quiet || git commit -m "chore: odświeżenie prac z ORCID"
          git push
